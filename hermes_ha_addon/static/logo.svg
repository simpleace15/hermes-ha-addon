<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: rounded square with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="80" y1="40" x2="180" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03a9f4"/>
      <stop offset="1" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="chatGrad" x1="100" y1="90" x2="170" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0e0e0"/>
      <stop offset="1" stop-color="#b0b0b0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- Outer ring (subtle) -->
  <circle cx="128" cy="128" r="100" stroke="#1a1a1a" stroke-width="2" fill="none"/>

  <!-- Robot head silhouette (accent) -->
  <g filter="url(#glow)">
    <!-- Antenna -->
    <line x1="128" y1="52" x2="128" y2="68" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="128" cy="48" r="5" fill="url(#accentGrad)"/>

    <!-- Head outline -->
    <path d="M88 76 Q88 64 100 64 L156 64 Q168 64 168 76 L168 132 Q168 144 156 144 L100 144 Q88 144 88 132 Z" 
          fill="none" stroke="url(#accentGrad)" stroke-width="4"/>

    <!-- Eyes (chat bubbles) -->
    <rect x="102" y="88" width="22" height="16" rx="4" fill="url(#accentGrad)" opacity="0.9"/>
    <rect x="132" y="88" width="22" height="16" rx="4" fill="url(#accentGrad)" opacity="0.9"/>

    <!-- Smile / speech indicator -->
    <path d="M104 116 Q128 128 152 116" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Neck -->
    <line x1="128" y1="144" x2="128" y2="156" stroke="url(#accentGrad)" stroke-width="3"/>

    <!-- Shoulders/body hint -->
    <path d="M96 156 Q96 168 108 172 L148 172 Q160 168 160 156" 
          fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Chat bubble overlay (bottom right) -->
  <g filter="url(#glow)">
    <path d="M168 160 Q168 152 176 152 L220 152 Q228 152 228 160 L228 192 Q228 200 220 200 L196 200 L188 210 L188 200 L176 200 Q168 200 168 192 Z"
          fill="url(#bgGrad)" stroke="url(#chatGrad)" stroke-width="2.5"/>
    <!-- Dots in bubble -->
    <circle cx="184" cy="176" r="3" fill="url(#chatGrad)"/>
    <circle cx="198" cy="176" r="3" fill="url(#chatGrad)"/>
    <circle cx="212" cy="176" r="3" fill="url(#chatGrad)"/>
  </g>

  <!-- "HA" home icon accent (top left, subtle) -->
  <g opacity="0.3">
    <path d="M36 44 L52 36 L68 44 L68 60 L52 68 L36 60 Z" fill="none" stroke="#03a9f4" stroke-width="2"/>
    <path d="M48 60 L48 52 L56 52 L56 60" fill="none" stroke="#03a9f4" stroke-width="1.5"/>
  </g>
</svg>