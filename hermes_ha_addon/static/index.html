<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <title>Hermes Agent Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=200">
    <script>
        // Detect HA Ingress path prefix from current URL
        // HA Ingress serves under /api/hassio_ingress/<token>/
        // We extract the prefix so all fetch() calls resolve correctly
        (function() {
            var path = window.location.pathname;
            var prefix = '';
            if (path.indexOf('/api/hassio_ingress/') === 0) {
                var parts = path.split('/');
                if (parts.length >= 4) {
                    prefix = '/' + parts[1] + '/' + parts[2] + '/' + parts[3];
                }
            }
            window.HERMES_BASE = prefix || '';
            console.log('Hermes Ingress prefix:', window.HERMES_BASE);
        })();
    </script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button id="sidebar-toggle" class="icon-btn" title="Toggle sessions">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="logo">
                    <img src="icon.svg" width="24" height="24" alt="" onerror="this.style.display='none'">
                    <span>Hermes Agent</span>
                </div>
            </div>
            <div class="header-center">
                <select id="profile-selector" class="profile-selector">
                    <option value="">Loading profiles...</option>
                </select>
                <select id="model-selector" class="model-selector" title="Select model">
                    <option value="">Auto</option>
                </select>
                <span id="model-name" class="model-name"></span>
            </div>
            <div class="header-right">
                <button id="workspace-toggle" class="icon-btn" title="Toggle workspace">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                        <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                        <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main content area -->
        <div class="main">
            <!-- Left sidebar: Sessions -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <input type="text" id="session-search" class="search-input" placeholder="Search sessions...">
                </div>
                <div class="sidebar-actions">
                    <button id="new-session-btn" class="btn btn-primary btn-block">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        New Session
                    </button>
                    <button id="export-session-btn" class="btn btn-block">Export Session (MD)</button>
                    <button id="export-json-btn" class="btn btn-block">Export Session (JSON)</button>
                </div>
                <div id="session-list" class="session-list">
                    <!-- Sessions populated by JS -->
                </div>
            </aside>

            <!-- Center: Chat -->
            <main class="chat-area">
                <div id="messages" class="messages">
                    <!-- Messages populated by JS -->
                </div>
                <div class="chat-input-area">
                    <div id="image-preview" class="image-preview" style="display:none;"></div>
                    <div id="command-dropdown" class="command-dropdown" style="display:none;"></div>
                    <div class="input-row">
                        <textarea id="message-input" class="message-input"
                            placeholder="Type a message... (or / for commands)"
                            rows="1"></textarea>
                        <button id="preview-btn" class="icon-btn" title="Toggle markdown preview" style="flex-shrink:0;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <button id="send-btn" class="btn btn-primary btn-send" title="Send (Enter)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                        <button id="stop-btn" class="btn btn-danger btn-send" style="display:none;" title="Stop">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="6" y="6" width="12" height="12"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>

            <!-- Right panel: Workspace -->
            <aside id="workspace" class="workspace" style="display:none;">
                <div class="workspace-header">
                    <h3>Workspace</h3>
                    <button id="workspace-close" class="icon-btn" title="Close">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="workspace-tabs">
                    <button class="workspace-tab active" data-tab="files">Files</button>
                    <button class="workspace-tab" data-tab="skills">Skills</button>
                    <button class="workspace-tab" data-tab="toolsets">Tools</button>
                </div>
                <div id="workspace-content" class="workspace-content">
                    <div class="workspace-placeholder">
                        Ask the agent to list files, or use file tools to browse the workspace.
                    </div>
                </div>
            </aside>
        </div>

        <!-- Status bar -->
        <footer class="status-bar">
            <span id="status-text" class="status-text">Ready</span>
            <span id="health-info" class="health-info" style="display:none;"></span>
            <span id="connection-status" class="connection-status">
                <span class="dot dot-offline"></span>
                <span id="connection-label">Disconnected</span>
            </span>
        </footer>
    </div>

    <!-- Scripts (order matters — dependencies first) -->
    <script src="utils.js?v=200"></script>
    <script src="markdown.js?v=200"></script>
    <script src="commands.js?v=200"></script>
    <script src="sessions.js?v=200"></script>
    <script src="workspace.js?v=200"></script>
    <script src="chat.js?v=200"></script>
    <script src="app.js?v=200"></script>
</body>
</html>
